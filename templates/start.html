<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Start - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #00c6ff, #0072ff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      background: #0072ff;
      color: white;
      text-align: center;
    }
    .form-control, .form-select {
      border-radius: 8px;
    }
    .btn-custom {
      background: #00c6ff;
      color: white;
      border-radius: 8px;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #0072ff;
    }
  </style>
</head>
<body>

<div class="container" style="max-width:500px;">
  <div class="card shadow-lg">
    <div class="card-header">
      <h4>Welcome to EventEase</h4>
    </div>
    <div class="card-body p-4">

      <form method="POST">

        <!-- Role Selection -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Select Role</label>
          <select name="role" class="form-select" required>
            <option value="admin">Admin</option>
            <option value="student">Student</option>
          </select>
        </div>

        <!-- College ID -->
        <div class="mb-3">
          <label class="form-label fw-semibold">College ID</label>
          <input type="text" name="college_id" class="form-control" placeholder="Enter your College ID" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between mb-3">
          <button type="submit" class="btn btn-custom px-4 fw-semibold">Continue</button>
          <a href="/" class="btn btn-secondary px-4 fw-semibold">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>

</body>
</html>
