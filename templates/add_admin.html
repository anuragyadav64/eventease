<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Admin - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="container" style="max-width:420px;">
  <div class="card shadow-lg border-0 rounded-3">
    <div class="card-header bg-dark text-white text-center rounded-top-3">
      <h4 class="mb-0">Create Admin Account</h4>
    </div>

    <div class="card-body p-4">
      <form method="POST">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">College ID</label>
          <input type="text" name="college_id" class="form-control" placeholder="Enter College ID" required value="{{ college_id or '' }}">
        </div>

        <button class="btn btn-dark w-100 fw-semibold">Create Admin</button>
      </form>

      {% if error %}
      <div class="alert alert-danger text-center mt-3">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</div>

</body>
</html>
