<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Feedback - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="container" style="max-width:700px;">
  <div class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header bg-info text-white text-center rounded-top-3">
      <h4 class="mb-0">User Feedback</h4>
    </div>

    <!-- Body -->
    <div class="card-body p-4">

      {% if feedbacks %}
        <ul class="list-group list-group-flush">
          {% for f in feedbacks %}
          <li class="list-group-item">
            <strong>{{ f[0] }}:</strong> {{ f[1] }}
          </li>
          {% endfor %}
        </ul>
      {% else %}
        <div class="alert alert-info text-center">No feedback yet.</div>
      {% endif %}

      <!-- Back Button -->
      <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-secondary fw-semibold">⬅ Back to Dashboard</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
