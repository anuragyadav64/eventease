<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="container" style="max-width:500px;">

  <div class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header bg-primary text-white text-center rounded-top-3">
      <h4 class="mb-0">Submit Your Feedback</h4>
    </div>

    <!-- Body -->
    <div class="card-body p-4">

      <!-- Success Alert -->
      {% if request.args.get("feedback") %}
      <div class="alert alert-success text-center">Thank you for your feedback!</div>
      {% endif %}

      <!-- Feedback Form -->
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Your Name</label>
          <input name="name" class="form-control" placeholder="Enter your name" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Message</label>
          <textarea name="message" class="form-control" rows="4" placeholder="Write your feedback here..." required></textarea>
        </div>

        <button class="btn btn-primary w-100 fw-semibold">Submit Feedback</button>
      </form>

    </div>

  </div>

</div>

</body>
</html>
