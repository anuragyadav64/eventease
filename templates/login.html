<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="container" style="max-width:420px;">

  <div class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header bg-dark text-white text-center rounded-top-3">
      <h4 class="mb-0">Admin Login</h4>
    </div>

    <!-- Body -->
    <div class="card-body p-4">

      <!-- Error Alert -->
      {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
      {% endif %}

      <!-- Login Form -->
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input name="username" class="form-control" placeholder="Enter Username" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input name="password" type="password" class="form-control" placeholder="Enter Password" required>
        </div>

        <!-- ✅ College ID field added -->
        <div class="mb-3">
          <label class="form-label fw-semibold">College ID</label>
          <input name="college_id" class="form-control" placeholder="Enter College ID" required value="{{ college_id or '' }}">
        </div>

        <button class="btn btn-dark w-100 fw-semibold">Login</button>
      </form>

      {% if show_register %}
      <div class="alert alert-info mt-4 text-center">
        Admin account not found. <a href="/add_admin" class="alert-link">Create new admin account</a> with this college ID.
      </div>
      {% endif %}

    </div>

  </div>

</div>

</body>
</html>
