<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Participants List - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .card {
      border-radius: 12px;
      overflow: hidden;
    }
    .card-header {
      background: #343a40;
      color: white;
      text-align: center;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="container" style="max-width:1000px;">

  <div class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header">
      <h4 class="mb-0">Participants for <strong>{{ event_title }}</strong></h4>
    </div>

    <!-- Body -->
    <div class="card-body p-4">

      <!-- Responsive Table -->
      <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
          <thead class="table-dark">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Roll No</th>
              <th>Department</th>
              <th>Year</th>
              <th>Role</th>
              <th>Sub Event</th>
            </tr>
          </thead>
          <tbody>
            {% for p in participants %}
            <tr>
              <td>{{ p[0] }}</td>
              <td>{{ p[1] }}</td>
              <td>{{ p[2] }}</td>
              <td>{{ p[3] }}</td>
              <td>{{ p[4] }}</td>
              <td>{{ p[5] }}</td>
              <td>{{ p[6] }}</td>
              <td>
                {% if p[6] == "Performer" %}
                  {{ p[7] }}
                {% else %}
                  -
                {% endif %}
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>

      <!-- Back Button -->
      <div class="text-center mt-3">
        <a href="/dashboard" class="btn btn-secondary fw-semibold">⬅ Back to Dashboard</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
