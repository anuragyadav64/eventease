<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">
<div class="container" style="max-width:600px;">
  <div class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header bg-success text-white text-center rounded-top-3">
      <h4 class="mb-0">Register for {{ event[1] }}</h4>
    </div>

    <!-- Body -->
    <div class="card-body p-4">
      <form method="post">

        <!-- Name -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Your Name</label>
          <input name="name" class="form-control" placeholder="Enter your name" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Your Email</label>
          <input name="email" type="email" class="form-control" placeholder="Enter your email" required>
        </div>

        <!-- Phone (10 digits only) -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone Number</label>
          <input name="phone" type="text" class="form-control" 
                 placeholder="Enter 10-digit phone" 
                 pattern="\d{10}" maxlength="10" required>
          <small class="text-muted">Must be exactly 10 digits</small>
        </div>

        <!-- Roll No -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Roll Number</label>
          <input name="rollno" class="form-control" placeholder="Enter your roll number" required>
        </div>

        <!-- Department -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Department (optional)</label>
          <select name="department" class="form-select">
            <option value="">Select Department</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Information Technology">Information Technology</option>
            <option value="Electronics">Electronics</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Civil">Civil</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <!-- Year -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Year</label>
          <select name="year" class="form-select" required>
            <option value="">Select Year</option>
            <option value="1st Year">1st Year</option>
            <option value="2nd Year">2nd Year</option>
            <option value="3rd Year">3rd Year</option>
            <option value="4th Year">4th Year</option>
          </select>
        </div>

        <!-- Role -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Role</label>
          <select name="role" id="roleSelect" class="form-select" required>
            <option value="">Select Role</option>
            <option value="Attendee">Attendee</option>
            <option value="Performer">Performer</option>
          </select>
        </div>

        <!-- Sub Event (hidden by default, shown only if Performer) -->
        {% if event[9] %}
        <div class="mb-3" id="subEventDiv" style="display:none;">
          <label class="form-label fw-semibold">Sub Event (if Performer)</label>
          <select name="sub_event" id="subEventSelect" class="form-select">
            <option value="">Select Sub Event</option>
            {% for sub in event[9].split(',') %}
              <option value="{{ sub.strip() }}">{{ sub.strip() }}</option>
            {% endfor %}
          </select>
        </div>
        {% endif %}

        <!-- Submit -->
        <button class="btn btn-success w-100 fw-semibold">Submit Registration</button>
      </form>

      <!-- Back -->
      <div class="mt-3 text-center">
        <a href="/details/{{ event[0] }}" class="btn btn-secondary fw-semibold">⬅ Back to Event</a>
      </div>

      {% if error %}
      <div class="alert alert-danger text-center mt-3">{{ error }}</div>
      {% endif %}
    </div>
  </div>
</div>

<!-- ✅ JavaScript to toggle Sub Event -->
<script>
  document.getElementById("roleSelect").addEventListener("change", function() {
    var role = this.value;
    var subEventDiv = document.getElementById("subEventDiv");
    var subEventSelect = document.getElementById("subEventSelect");

    if (role === "Performer") {
      subEventDiv.style.display = "block";
      if(subEventSelect) subEventSelect.required = true;
    } else {
      subEventDiv.style.display = "none";
      if(subEventSelect) {
        subEventSelect.required = false;
        subEventSelect.value = "";
      }
    }
  });
</script>
</body>
</html>
