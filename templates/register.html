<form method="post">

  <div class="mb-3">
    <label class="form-label fw-semibold">Your Name</label>
    <input name="name" class="form-control" placeholder="Enter your name" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Your Email</label>
    <input name="email" type="email" class="form-control" placeholder="Enter your email" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Phone Number</label>
    <input name="phone" type="text" class="form-control" placeholder="Enter 10-digit phone" required>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Roll Number</label>
    <input name="rollno" class="form-control" placeholder="Enter your roll number" required>
  </div>

  <!-- ✅ Department dropdown with Other option -->
  <div class="mb-3">
    <label class="form-label fw-semibold">Department (optional)</label>
    <select name="department" class="form-select">
      <option value="">Select Department</option>
      <option value="Computer Science">Computer Science</option>
      <option value="Information Technology">Information Technology</option>
      <option value="Electronics">Electronics</option>
      <option value="Mechanical">Mechanical</option>
      <option value="Civil">Civil</option>
      <option value="Other">Other</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label fw-semibold">Year</label>
    <select name="year" class="form-select" required>
      <option value="">Select Year</option>
      <option value="1st Year">1st Year</option>
      <option value="2nd Year">2nd Year</option>
      <option value="3rd Year">3rd Year</option>
      <option value="4th Year">4th Year</option>
    </select>
  </div>

  <!-- ✅ Role dropdown with only 2 options -->
  <div class="mb-3">
    <label class="form-label fw-semibold">Role</label>
    <select name="role" class="form-select" required>
      <option value="">Select Role</option>
      <option value="Attendee">Attendee</option>
      <option value="Performer">Performer</option>
    </select>
  </div>

  <!-- ✅ Sub Event dropdown populated from admin's event -->
  {% if event[9] %} <!-- assuming sub_events is at index 9 in events table -->
  <div class="mb-3">
    <label class="form-label fw-semibold">Sub Event (if Performer)</label>
    <select name="sub_event" class="form-select">
      <option value="">Select Sub Event</option>
      {% for sub in event[9].split(',') %}
        <option value="{{ sub.strip() }}">{{ sub.strip() }}</option>
      {% endfor %}
    </select>
  </div>
  {% endif %}

  <button class="btn btn-success w-100 fw-semibold">Submit Registration</button>
</form>
