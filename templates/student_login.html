<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Login - EventEase</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="container" style="max-width:420px;">

  <div class="card shadow-lg border-0 rounded-3">

    <!-- Header -->
    <div class="card-header bg-primary text-white text-center rounded-top-3">
      <h4 class="mb-0">Student Login</h4>
    </div>

    <!-- Body -->
    <div class="card-body p-4">

      <!-- Error Alert -->
      {% if error %}
      <div class="alert alert-danger text-center">{{ error }}</div>
      {% endif %}

      <!-- Login Form -->
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input name="email" type="email" class="form-control" placeholder="Enter Email" required>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Roll Number</label>
          <input name="rollno" class="form-control" placeholder="Enter Roll Number" required>
        </div>

        <button class="btn btn-primary w-100 fw-semibold">Login</button>
      </form>

    </div>

  </div>

</div>

</body>
</html>
