<div class="container mt-5">

  <!-- Top Bar with My Registrations -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold text-dark">Dashboard</h3>
    {% if student_email %}
    <a href="/my_registrations/{{ student_email }}" class="btn btn-primary fw-semibold">
      <i class="bi bi-journal-check"></i> My Registrations
    </a>
    {% endif %}
  </div>

  <!-- Dashboard Cards -->
  <div class="row g-4 mb-4">
    <div class="col-12 col-md-6 col-lg-3">
      <div class="card text-center shadow-sm border-0 rounded-3">
        <div class="card-body">
          <div class="mb-2 text-primary"><i class="bi bi-calendar-event" style="font-size:24px;"></i></div>
          <h6>Total Events</h6>
          <h3 class="text-primary">{{ total_events }}</h3>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card text-center shadow-sm border-0 rounded-3">
        <div class="card-body">
          <div class="mb-2 text-warning"><i class="bi bi-clock-history" style="font-size:24px;"></i></div>
          <h6>Upcoming Events</h6>
          <h3 class="text-warning">{{ upcoming_events }}</h3>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card text-center shadow-sm border-0 rounded-3">
        <div class="card-body">
          <div class="mb-2 text-success"><i class="bi bi-check-circle" style="font-size:24px;"></i></div>
          <h6>Completed Events</h6>
          <h3 class="text-success">{{ completed_events }}</h3>
        </div>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-3">
      <div class="card text-center shadow-sm border-0 rounded-3">
        <div class="card-body">
          <div class="mb-2 text-info"><i class="bi bi-people" style="font-size:24px;"></i></div>
          <h6>Total Participants</h6>
          <h3 class="text-info">{{ total_participants }}</h3>
        </div>
      </div>
    </div>
  </div>

</div>
